<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>KindGesund</title>
  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body>
  <div id="pinOverlay" class="pin-overlay hidden">
    <div class="pin-card">
      <div class="pin-icon">♥</div>
      <h1>KindGesund</h1>
      <p>PIN eingeben</p>
      <input id="pinInput" type="password" inputmode="numeric" placeholder="PIN" autocomplete="current-password" />
      <button id="pinButton" class="btn primary">Entsperren</button>
      <p id="pinError" class="error"></p>
    </div>
  </div>

  <main class="app">
    <header class="topbar">
      <div>
        <p class="kicker">Gesundheitstagebuch</p>
        <h1 id="activeProfileTitle">Kind</h1>
      </div>
      <div class="top-actions">
        <button id="profileButton" class="icon-btn" aria-label="Profil öffnen">☰</button>
        <button id="backupButton" class="icon-btn" aria-label="Backup öffnen">⇩</button>
        <button id="todayButton" class="icon-btn">Heute</button>
      </div>
    </header>

    <section class="date-card">
      <button id="prevDay" class="round-btn" aria-label="Vorheriger Tag">‹</button>
      <div class="date-main">
        <input id="selectedDate" type="date" />
        <strong id="prettyDate">Heute</strong>
        <span id="daySummary">Noch kein Eintrag</span>
      </div>
      <button id="nextDay" class="round-btn" aria-label="Nächster Tag">›</button>
    </section>

    <section id="dayEntries" class="day-entries"></section>
<section id="entrySheet" class="sheet hidden" aria-hidden="true">
      <div class="sheet-backdrop" id="sheetBackdrop"></div>
      <form id="entryForm" class="sheet-panel">
        <input type="hidden" id="entryId" />
        <input type="hidden" id="time" />

        <div class="sheet-head">
          <div>
            <h2 id="entryFormTitle">Neuer Eintrag</h2>
            <p id="autoTimeText">Uhrzeit wird automatisch gespeichert</p>
          </div>
          <button type="button" id="closeEntry" class="round-btn">×</button>
        </div>

        <div class="quick-grid">
          <label class="field temperature-field">
            <span>Temperatur</span>
            <input id="temperature" type="number" step="0.1" min="30" max="45" placeholder="38.4" />
            <input id="temperatureSlider" class="temperature-slider" type="range" min="34" max="42" step="0.1" value="37.0" />
            <div class="slider-scale">
              <span>34°</span>
              <span>37°</span>
              <span>39°</span>
              <span>42°</span>
            </div>
          </label>

          <div class="field mood-field">
            <span>Stimmung</span>
            <input id="mood" type="hidden" />
            <div id="moodOptions" class="mood-options" role="radiogroup" aria-label="Stimmung">
              <button type="button" class="mood-option" data-mood="Gut drauf" aria-label="Gut drauf"><span>😊</span><small>Gut</small></button>
              <button type="button" class="mood-option" data-mood="Müde" aria-label="Müde"><span>😴</span><small>Müde</small></button>
              <button type="button" class="mood-option" data-mood="Quengelig" aria-label="Quengelig"><span>😣</span><small>Quengelig</small></button>
              <button type="button" class="mood-option" data-mood="Schlapp" aria-label="Schlapp"><span>🥱</span><small>Schlapp</small></button>
              <button type="button" class="mood-option" data-mood="Schmerzen" aria-label="Schmerzen"><span>🤕</span><small>Schmerz</small></button>
              <button type="button" class="mood-option" data-mood="Unruhig" aria-label="Unruhig"><span>😟</span><small>Unruhig</small></button>
            </div>
          </div>

          <label class="field">
            <span>Flüssigkeit</span>
            <input id="fluidsMl" type="number" min="0" step="10" placeholder="ml" />
          </label>
        </div>

        <div class="section-card">
          <h3>Symptome</h3>
          <div class="chips" id="symptomChips">
            <label><input type="checkbox" value="Fieber" /><span class="symptom-icon">🌡️</span><span>Fieber</span></label>
            <label><input type="checkbox" value="Husten" /><span class="symptom-icon">🤧</span><span>Husten</span></label>
            <label><input type="checkbox" value="Schnupfen" /><span class="symptom-icon">👃</span><span>Schnupfen</span></label>
            <label><input type="checkbox" value="Halsschmerzen" /><span class="symptom-icon">🗣️</span><span>Hals</span></label>
            <label><input type="checkbox" value="Ohrenschmerzen" /><span class="symptom-icon">👂</span><span>Ohren</span></label>
            <label><input type="checkbox" value="Bauchschmerzen" /><span class="symptom-icon">🤢</span><span>Bauch</span></label>
            <label><input type="checkbox" value="Durchfall" /><span class="symptom-icon">🚽</span><span>Durchfall</span></label>
            <label><input type="checkbox" value="Erbrechen" /><span class="symptom-icon">🤮</span><span>Erbrechen</span></label>
            <label><input type="checkbox" value="Ausschlag" /><span class="symptom-icon">🩹</span><span>Ausschlag</span></label>
            <label><input type="checkbox" value="Appetitlosigkeit" /><span class="symptom-icon">🍽️</span><span>Appetit</span></label>
          </div>
          <input id="customSymptoms" type="text" placeholder="Weitere Symptome" />
        </div>

        <div class="section-card">
          <h3>Details</h3>
          <label class="field full icon-textarea-field"><span><span class="field-icon">💊</span>Medikamente</span><textarea id="medication" rows="2" placeholder="Name, Dosis, Uhrzeit"></textarea></label>
          <label class="field full icon-textarea-field"><span><span class="field-icon">🍽️</span>Essen</span><textarea id="food" rows="2" placeholder="Was wurde gegessen?"></textarea></label>
          <label class="field full icon-textarea-field"><span><span class="field-icon">😴</span>Schlaf</span><textarea id="sleep" rows="2" placeholder="Dauer, Qualität, Auffälligkeiten"></textarea></label>
          <label class="field full icon-textarea-field"><span><span class="field-icon">🚽</span>Windel / Toilette</span><textarea id="diaperOrToilet" rows="2" placeholder="Urin, Stuhlgang, Auffälligkeiten"></textarea></label>
          <label class="field full icon-textarea-field"><span><span class="field-icon">📝</span>Notizen</span><textarea id="notes" rows="2" placeholder="Alles, was wichtig sein könnte"></textarea></label>
        </div>

        <div class="sheet-actions">
          <button type="button" id="deleteCurrent" class="btn danger hidden">Löschen</button>
          <button type="submit" class="btn primary">Speichern</button>
        </div>
      </form>
    </section>
<section id="profileView" class="modal-view hidden">
      <div class="view-card">
        <div class="sheet-head">
          <h2>Profil</h2>
          <button class="round-btn close-view">×</button>
        </div>
        <label class="field full"><span>Name des Kindes</span><input id="profileName" type="text" maxlength="80" /></label>
        <label class="field full"><span>Geburtsdatum</span><input id="profileBirthDate" type="date" /></label>
        <label class="field full">
          <span>Farbtheme</span>
          <select id="themeSelect">
            <option value="babyblue">Dunkles Babyblau</option>
            <option value="mint">Sanftes Mint</option>
            <option value="lavender">Lavendel</option>
            <option value="peach">Pfirsich</option>
            <option value="rose">Rosa</option>
            <option value="slate">Schieferblau</option>
            <option value="darkslate">Dunkles Slate</option>
            <option value="ocean">Ocean</option>
            <option value="forest">Forest</option>
            <option value="sand">Sand</option>
            <option value="berry">Berry</option>
            <option value="mono">Monochrom</option>
          </select>
        </label>
        <label class="field full"><span>Hinweise</span><textarea id="profileNotes" rows="3"></textarea></label>
        <button id="saveProfileButton" class="btn primary">Profil speichern</button>
      </div>
    </section>

    <section id="backupView" class="modal-view hidden">
      <div class="view-card">
        <div class="sheet-head">
          <h2>Backup</h2>
          <button class="round-btn close-view">×</button>
        </div>
        <a class="btn secondary" href="./api/export" download>Export herunterladen</a>
        <label class="btn secondary file-label">Import auswählen<input id="importFile" type="file" accept="application/json" /></label>
      </div>
    </section>
  </main>

  <div class="bottom-action-bar">
    <button id="openEntry" class="bottom-add-button">+ Neuer Eintrag</button>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script src="./assets/app.js"></script>
</body>
</html>
