# Home Assistant Beispiele für Apple-Watch-Schnellaktionen
#
# Diese Scripts kannst du sinngemäß in Home Assistant unter Einstellungen → Automatisierungen & Szenen → Skripte anlegen.
# Danach kannst du sie in der Home Assistant Companion App als Apple-Watch-Aktionen verwenden.
#
# WICHTIG:
# Ersetze die URL durch die interne URL deines Add-ons.
# Je nach Setup kann das z. B. sein:
#   http://a0d7b954-gesundheitstracker:8099
#   http://homeassistant.local:8099
#   http://<HA-IP>:8099
#
# Wenn du in der App eine PIN aktiviert hast, ergänze im Header:
#   x-kindgesund-pin: "DEINE_PIN"

script:
  gesundheitstracker_100_ml:
    alias: "Gesundheitstracker: 100 ml"
    sequence:
      - service: rest_command.gesundheitstracker_fluid
        data:
          ml: 100

  gesundheitstracker_250_ml:
    alias: "Gesundheitstracker: 250 ml"
    sequence:
      - service: rest_command.gesundheitstracker_fluid
        data:
          ml: 250

  gesundheitstracker_fieber_385:
    alias: "Gesundheitstracker: 38,5 °C"
    sequence:
      - service: rest_command.gesundheitstracker_temperature
        data:
          temperature: 38.5

  gesundheitstracker_symptom_husten:
    alias: "Gesundheitstracker: Husten"
    sequence:
      - service: rest_command.gesundheitstracker_symptom
        data:
          symptom: "Husten"

  gesundheitstracker_symptom_fieber:
    alias: "Gesundheitstracker: Fieber"
    sequence:
      - service: rest_command.gesundheitstracker_symptom
        data:
          symptom: "Fieber"

  gesundheitstracker_mood_mude:
    alias: "Gesundheitstracker: Müde"
    sequence:
      - service: rest_command.gesundheitstracker_mood
        data:
          mood: "Müde"

rest_command:
  gesundheitstracker_fluid:
    url: "http://homeassistant.local:8099/api/quick/fluid"
    method: post
    content_type: "application/json"
    payload: '{"ml": {{ ml }}}'

  gesundheitstracker_temperature:
    url: "http://homeassistant.local:8099/api/quick/temperature"
    method: post
    content_type: "application/json"
    payload: '{"temperature": {{ temperature }}}'

  gesundheitstracker_symptom:
    url: "http://homeassistant.local:8099/api/quick/symptom"
    method: post
    content_type: "application/json"
    payload: '{"symptom": "{{ symptom }}"}'

  gesundheitstracker_mood:
    url: "http://homeassistant.local:8099/api/quick/mood"
    method: post
    content_type: "application/json"
    payload: '{"mood": "{{ mood }}"}'

  gesundheitstracker_medication:
    url: "http://homeassistant.local:8099/api/quick/medication"
    method: post
    content_type: "application/json"
    payload: '{"medication": "{{ medication }}"}'

  gesundheitstracker_food_sleep:
    url: "http://homeassistant.local:8099/api/quick/food-sleep"
    method: post
    content_type: "application/json"
    payload: '{"food": "{{ food | default("") }}", "sleep": "{{ sleep | default("") }}"}'
